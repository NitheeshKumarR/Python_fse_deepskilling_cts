<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduCore Student Portal</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <header>
        <h1>EduCore Student Portal</h1>
    </header>

    <main>
        <h2>Courses</h2>

        <input id="search-courses" type="text" placeholder="Search courses...">

        <div class="course-grid"></div>

        <p id="total-credits"></p>

        <div id="selected-course"></div>
    </main>

    <script type="module" src="app.js"></script>
</body>
</html>
